# > DNS 查询失败走 Final 规则
FINAL,兜底,dns-failed

[URL Rewrite]
# 重定向谷歌搜索
^https?:\/\/(?:www\.)?(google|g)\.cn https://www.google.com 302

[MITM]
skip-server-cert-verify = true
h2 = true
hostname = %APPEND% www.g.cn, www.google.cn
ca-passphrase = 
ca-p12 = 
